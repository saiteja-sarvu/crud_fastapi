<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add User</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    {% if show_header %}
    <header class="navbar navbar-dark bg-dark px-3">
      <span class="navbar-brand mb-0 h1">User Manager</span>

      <div class="d-flex align-items-center">
        <span class="text-light me-3">
          Welcome, <strong>{{ username }}</strong>
        </span>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </header>
    {% endif %}
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="mb-4 text-center">Add User</h3>

              <form action="/add" method="post">
                <div class="mb-3">
                  <label class="form-label">Name</label>
                  <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Enter name"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter email"
                    required
                  />
                </div>

                <div class="d-flex justify-content-between">
                  <a href="/" class="btn btn-secondary">Back</a>
                  <button type="submit" class="btn btn-primary">Save</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    {% if show_footer %}
    <footer class="text-center text-muted py-3 mt-4">
      &copy; {{ current_year }} User Manager. All rights reserved.
    </footer>
    {% endif %}
  </body>
</html>
